<svg viewBox="0 0 980 1180" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a4150"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b3402f"/>
    </marker>
    <marker id="arrowDecoy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a7d52"/>
    </marker>
    <style>
      .lbl{fill:#1b2027;font-size:15px;font-weight:600}
      .sub{fill:#5b6470;font-size:12px;font-weight:400}
      .mono{font-family:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace}
      .tag{fill:#fff;font-size:10.5px;font-weight:700;letter-spacing:.04em}
      .gatetxt{fill:#7a3d12;font-size:12px;font-weight:600}
      .flow{stroke:#3a4150;stroke-width:2;fill:none}
      .flowred{stroke:#b3402f;stroke-width:2.4;fill:none}
      .flowdecoy{stroke:#8a7d52;stroke-width:1.8;fill:none;stroke-dasharray:6 5}
    </style>
  </defs>

  <rect width="980" height="1180" fill="#f7f6f2"/>

  <!-- title -->
  <text x="40" y="46" fill="#11151b" font-size="22" font-weight="800">Tycoon 2FA fake CAPTCHA kill chain</text>
  <text x="40" y="68" class="sub">Six stages, three cloaking gates. Every gate fails closed. Author: Hamza Haroon</text>

  <!-- ===== Stage 1: mailbox ===== -->
  <rect x="300" y="96" width="380" height="62" rx="10" fill="#e8edf6" stroke="#b7c4da" stroke-width="1.5"/>
  <rect x="300" y="96" width="6" height="62" rx="3" fill="#3f6cb5"/>
  <text x="320" y="124" class="lbl">Compromised Microsoft 365 mailbox</text>
  <text x="320" y="144" class="sub mono">authenticated send  ·  SPF / DKIM / DMARC pass  ·  p=REJECT useless</text>

  <path class="flow" d="M490 158 L490 188" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: PDF ===== -->
  <rect x="300" y="190" width="380" height="62" rx="10" fill="#e8edf6" stroke="#b7c4da" stroke-width="1.5"/>
  <rect x="300" y="190" width="6" height="62" rx="3" fill="#3f6cb5"/>
  <text x="320" y="218" class="lbl">Google Workspace themed PDF lure</text>
  <text x="320" y="238" class="sub mono">/URI annotation -> screech741.cleatpeak.co.uk/incarceration914/</text>

  <path class="flow" d="M490 252 L490 282" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: redirector ===== -->
  <rect x="250" y="284" width="480" height="92" rx="10" fill="#eae6f3" stroke="#c2b6dd" stroke-width="1.5"/>
  <rect x="250" y="284" width="6" height="92" rx="3" fill="#7a5bb0"/>
  <text x="270" y="312" class="lbl">Layer 1 · vendor.9f65bf6b.js redirector</text>
  <text x="270" y="332" class="sub">fingerprint · devtools + VM detection · WebRTC IP leak (defeats VPN)</text>
  <text x="270" y="352" class="sub mono">POST analytics/_h/_p  ->  mz.cleatpeak.co.uk</text>
  <text x="270" y="368" class="sub mono">forward via data-u  ->  filesx.cleatpeak.co.uk</text>

  <path class="flow" d="M490 376 L490 406" marker-end="url(#arrow)"/>

  <!-- ===== Stage 4: cloaker with gates ===== -->
  <rect x="210" y="408" width="560" height="276" rx="12" fill="#f2ece2" stroke="#d8c7a8" stroke-width="1.5"/>
  <rect x="210" y="408" width="6" height="276" rx="3" fill="#c79a3a"/>
  <text x="230" y="436" class="lbl">Layer 2 · sudrosi.contractors fake CAPTCHA cloaker</text>
  <text x="230" y="455" class="sub">image grid or "Human Check" skin · atob -&gt; XOR -&gt; new Function packer</text>

  <!-- gate 1 -->
  <rect x="246" y="470" width="488" height="46" rx="8" fill="#fbf4e6" stroke="#e0c789" stroke-width="1.3"/>
  <text x="262" y="490" class="gatetxt">GATE 1 — network reputation</text>
  <text x="262" y="508" class="sub mono">fetch api.ipapi.is · reversed ASN denylist + is_datacenter boolean</text>

  <!-- gate 2 -->
  <rect x="246" y="524" width="488" height="46" rx="8" fill="#fbf4e6" stroke="#e0c789" stroke-width="1.3"/>
  <text x="262" y="544" class="gatetxt">GATE 2 — per victim path token</text>
  <text x="262" y="562" class="sub mono">regex on first path segment · literal "!" in entAyO6wFocW!1XPO</text>

  <!-- gate 3 -->
  <rect x="246" y="578" width="488" height="46" rx="8" fill="#fbf4e6" stroke="#e0c789" stroke-width="1.3"/>
  <text x="262" y="598" class="gatetxt">GATE 3 — Laravel session state machine</text>
  <text x="262" y="616" class="sub mono">cold request -> reload stub; only a real browser session advances</text>

  <!-- solved -->
  <rect x="246" y="634" width="488" height="36" rx="8" fill="#efe6d2" stroke="#d8c7a8" stroke-width="1.2"/>
  <text x="262" y="657" class="sub mono">pass all three -> solved CAPTCHA fires 90 byte POST (zone=) to self</text>

  <!-- decoy off-ramp -->
  <path class="flowdecoy" d="M770 547 L862 547 L862 300" marker-end="url(#arrowDecoy)"/>
  <rect x="792" y="252" width="148" height="58" rx="10" fill="#f3efe2" stroke="#c9bd92" stroke-width="1.4"/>
  <text x="808" y="276" fill="#6f6336" font-size="13" font-weight="700">Geo decoy</text>
  <text x="808" y="294" class="sub">ASOS · eMAG · Cdiscount</text>
  <text x="808" y="306" class="sub">IKEA · Zalando</text>
  <text x="792" y="335" fill="#8a7d52" font-size="11" font-style="italic">any gate fails -&gt; localized retail site</text>

  <path class="flowred" d="M490 684 L490 714" marker-end="url(#arrowRed)"/>

  <!-- ===== Stage 5: payload ===== -->
  <rect x="250" y="716" width="480" height="88" rx="12" fill="#f6e3df" stroke="#d99e92" stroke-width="1.6"/>
  <rect x="250" y="716" width="6" height="88" rx="3" fill="#b3402f"/>
  <rect x="690" y="730" width="30" height="18" rx="4" fill="#b3402f"/>
  <text x="705" y="743" text-anchor="middle" class="tag">!</text>
  <text x="270" y="744" class="lbl" fill="#7a2418">Layer 3 · Tycoon 2FA adversary in the middle</text>
  <text x="270" y="765" class="sub mono">dacharo.com/cyberia~qmanl  ·  81.28.12.12 (GCORE)  ·  flagged MALICIOUS</text>
  <text x="270" y="785" class="sub">relays M365 login · steals the post MFA session token (Storm-1747)</text>

  <!-- impact -->
  <path class="flowred" d="M490 804 L490 834" marker-end="url(#arrowRed)"/>
  <rect x="300" y="836" width="380" height="58" rx="10" fill="#fbeae6" stroke="#e3b5ab" stroke-width="1.4"/>
  <text x="320" y="862" class="lbl" fill="#7a2418">Account takeover, MFA bypassed</text>
  <text x="320" y="881" class="sub">valid session token stolen even after the victim approves the prompt</text>

  <!-- legend -->
  <text x="40" y="960" fill="#11151b" font-size="14" font-weight="800">Legend</text>
  <rect x="40" y="974" width="16" height="16" rx="3" fill="#e8edf6" stroke="#b7c4da"/>
  <text x="64" y="987" class="sub">Delivery (trusted, authenticated)</text>
  <rect x="300" y="974" width="16" height="16" rx="3" fill="#eae6f3" stroke="#c2b6dd"/>
  <text x="324" y="987" class="sub">Reconnaissance / fingerprint gate</text>
  <rect x="580" y="974" width="16" height="16" rx="3" fill="#f2ece2" stroke="#d8c7a8"/>
  <text x="604" y="987" class="sub">Cloaking gates (fail closed)</text>
  <rect x="40" y="1002" width="16" height="16" rx="3" fill="#f6e3df" stroke="#d99e92"/>
  <text x="64" y="1015" class="sub">Malicious payload (AiTM)</text>
  <rect x="300" y="1002" width="16" height="16" rx="3" fill="#f3efe2" stroke="#c9bd92"/>
  <text x="324" y="1015" class="sub">Decoy off-ramp (legitimate sites, do not block)</text>

  <text x="40" y="1066" class="sub" font-style="italic">Hunt the mechanisms, not the domains. The infrastructure is disposable; the tradecraft is not.</text>
</svg>
